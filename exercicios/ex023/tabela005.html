<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        caption {
            font-weight: bold;
        }
        td, th {
            border: 1px solid black;
            padding: 10px;
        }
        .cnome{
            background-color: aqua;
        }
        .cgroup {
            background-color: red;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="cgroup" span="2">
            <col class="cidade">
            <col class="cprofissão">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Maria</td>
            <td>Feminino</td>
            <td>23</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Joana</td>
            <td>Feminino</td>
            <td>30</td>
            <td>Bombeira</td>
        </tr>
        <tr>
            <td>Joao</td>
            <td>Masculino</td>
            <td>25</td>
            <td>Policial</td>
        </tr>
        <tr>
            <td>Pedro</td>
            <td>Masculino</td>
            <td>22</td>
            <td>Medico</td>
        </tr>
    </table>
</body>
</html>
