<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'harry';
            src: url('fontes/harry.ttf') format('truetype');

                /* 
                
                Tipos de Formats 
                
                - Opentype (otf)
                - Truetype (ttf)
                - Enbeded-opentype (Apple Advanced Typography)
                - SVG
                
                */

            }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'harry';
            font-size: 4em;
        }
    </style>
</head>
<body>
    <h1>Luis Gustavo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptates quibusdam vero perferendis! Repudiandae voluptas neque, corrupti temporibus culpa expedita nihil, ad tempore vel minima laboriosam eius fuga perferendis doloribus quibusdam!</p>
</body>
</html>
