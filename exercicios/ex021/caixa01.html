<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        body {
            margin-top: 20px;
        }
        h1 {
            background-color: aqua;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: black;
            border: 10px solid black;
            border-radius: 10px;

            padding: 10px 10px 10px 10px;
            padding: 10px;

            margin: 30px;
            margin: auto;

            outline-width: 10px;
            outline-style: double;
            outline-color: blue;
            outline: 10px double blue;
        }
        a {
            border-width: 10px;
            border-style: double;
            border-color: black;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box Level</h1>
    <p>Paragrafo tambem são exemplos de caixa box level, mas os <a href="#">links</a> são exemplos de caixa inline-level. Vamos ver como tudo isso funciona.</p>
</body>
</html>
